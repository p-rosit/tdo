name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compilers: "gcc,clang"
          - os: windows-latest
            compilers: "cl,clang"
          - os: macos-latest
            compilers: "gcc,clang"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up MSVC Developer Command Prompt
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
        shell: bash

      - name: Run Tests
        run: pytest . -vvv --color=yes --durations=99 --compiler ${{ matrix.compilers }} --optimization debug,minor,major
